<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom C2</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/terminal.css') }}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body class="crt-flicker">
<div class="scanlines"></div>
<header class="top">
  <div class="logo"><span class="glitch">PHANTOM</span>://C2</div>
  <div class="header-meta">
    <span><span class="dot"></span>ONLINE</span>
    &nbsp;|&nbsp; AGENTS: <span id="agentCount">0</span>
    &nbsp;|&nbsp; UPTIME: <span id="uptime">00:00:00</span>
  </div>
</header>
<main class="layout">
  <section class="panel left">
    <div class="panel-title">AGENTS</div>
    <div id="agentList"></div>
  </section>
  <section class="panel center">
    <div class="panel-title">TERMINAL — <span id="currentAid">none selected</span></div>
    <div class="terminal-wrap">
      <div class="output" id="output">────── PHANTOM C2 v0.1 ──────\nSelect an agent to begin.\n\n</div>
      <div class="input-row">
        <span class="prompt">root@phantom:~#</span>
        <input id="cmdInput" type="text" placeholder="enter command..." disabled autocomplete="off" spellcheck="false">
      </div>
    </div>
  </section>
  <section class="panel right">
    <div class="panel-title">MODULES</div>
    <ul class="module-list" id="moduleList"></ul>
    <div class="module-form" id="moduleForm" style="display:none;">
      <input id="key" data-key="key" placeholder="key">
      <input id="value" data-key="value" placeholder="value">
      <button class="btn" onclick="runModule()">RUN MODULE</button>
    </div>
  </section>
  <section class="panel bottom">
    <div class="panel-title">EVENT LOG</div>
    <div class="event-log" id="eventLog"></div>
  </section>
</main>
<script src="{{ url_for('static', filename='js/terminal.js') }}"></script>
</body>
</html>
